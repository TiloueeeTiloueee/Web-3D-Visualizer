<head>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="first">
        <div id="VBackdrop">
            <canvas id="Visualizer"></canvas>
        </div>
        <div id="FBackdrop" class="form">

            <div class="top">
                <h1>Simple Form</h1>
            </div>

            <div class="right">
                <div class="group">
                <label># of Points:</label>
                <input type="number" id="size" min="0" />
                </div>
            </div>

            <div class="left">
                <div class="group">
                <p>Lines: </p>
                <label>
                <input type="radio" name="optionA" value="enabled" checked />
                Enabled
                </label>
                <label>
                <input type="radio" name="optionA" value="disabled" />
                Disabled
                </label>
                </div>

                <div class="group">
                    <p>Points: </p>
                    <label>
                    <input type="radio" name="optionB" value="enabled" checked />
                    Enabled
                    </label>
                    <label>
                    <input type="radio" name="optionB" value="disabled" />
                    Disabled
                    </label>
                </div>
            </div>

            <div class="bottom">
                <button id="submitBtn">Submit</button>
            </div>

        </div>
    </div>

<script src="index.js"></script>
</body>

<head>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="first">
        <div id="VBackdrop">
            <canvas id="Visualizer"></canvas>
        </div>
        <div id="FBackdrop" class="form">

            <div class="top">
                <h1 class="form-element">Simple Form</h1>
            </div>

            <div class="right">
                <div class="group">
                <label class="form-element"># of Points:</label>
                <input class="form-element" type="number" id="size" min="0" />
                </div>
            </div>

            <div class="left">
                <div class="group">
                <p class="form-element">Lines: </p>
                <label class="form-element">
                <input type="radio" name="lines" data-key="linesEnabled" value="enabled" checked />
                Enabled
                </label>
                <label class="form-element">
                <input type="radio" name="lines" data-key="linesEnabled" value="disabled" />
                Disabled
                </label>
                </div>

                <div class="group">
                    <p class="form-element">Points: </p>
                    <label class="form-element">
                    <input type="radio" name="points" data-key="pointsEnabled" value="enabled" checked />
                    Enabled
                    </label>
                    <label class="form-element">
                    <input type="radio" name="points" data-key="pointsEnabled" value="disabled" />
                    Disabled
                    </label>
                </div>
            </div>

            <div class="bottom">
                <button class="form-element" id="submitBtn">Submit</button>
            </div>

        </div>
    </div>

    <script type="module" src="index.js"></script>
    <script type="module" src="form.js"></script>
</body>
